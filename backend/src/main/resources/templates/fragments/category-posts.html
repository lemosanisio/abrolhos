<div th:fragment="content">
    <h1>Posts in <span th:text="${slug}">Category</span></h1>
    <ul>
        <li th:each="post : ${posts}">
            <a th:href="@{'/posts/' + ${post.slug}}" th:text="${post.title}">Post Title</a>
            - <span th:text="${post.authorUsername}">Author</span>
        </li>
    </ul>
    <p>
        <a th:href="@{'/categories/' + ${slug}}">Back to Category</a>
    </p>
</div>
