<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" hx-boost="true">

<head th:replace="~{fragments/layout :: head('Categories')}">
</head>

<body>
    <h1>Categories</h1>
    <ul id="categories-list">
        <li th:each="category : ${categories}">
            <a th:href="@{'/categories/' + ${category.slug}}" th:text="${category.name}">Category Name</a>
        </li>
    </ul>
    <div th:if="${#lists.isEmpty(categories)}">
        <p>No categories found.</p>
    </div>
</body>

</html>
