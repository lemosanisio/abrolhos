application:
  name: ${APPLICATION_NAME}
spring:
  data:
    web:
      pageable:
        page-serialization-mode: ${SPRING_DATA_WEB_PAGE_SERIALIZATION_MODE}
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: AbrolhosHikariPool
  flyway:
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: ${MANAGEMENT_ENDPOINTS_HEALTH_PROBES_ENABLED}
      show-details: always
      group:
        readiness:
          include: readinessState,db,redis
        liveness:
          include: livenessState,diskSpace
  metrics:
    tags:
      application: abrolhos
      environment: ${ENVIRONMENT:dev}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

jwt:
  secret: ${JWT_SECRET}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}



# Security hardening configuration
security:
  cors:
    allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS}}
  rate-limit:
    max-requests: ${SECURITY_RATE_LIMIT_MAX_REQUESTS:5}
    window-minutes: ${SECURITY_RATE_LIMIT_WINDOW_MINUTES:15}
  encryption:
    key: ${SECURITY_ENCRYPTION_KEY:}
    old-keys: ${SECURITY_ENCRYPTION_OLD_KEYS:}
  password:
    min-length: 12
    max-length: 128
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special-char: true
    bcrypt-strength: 12
    special-chars: "!@#$%^&*()_+-=[]{}|;:,.<>?"
    reset-token-expiry-hours: 1
    reset-token-byte-size: 32
    cleanup-cron: "0 0 * * * *"

logging:
  structured:
    format:
      console: ecs
      file: ecs
  level:
    root: INFO
    br.dev.demoraes.abrolhos: DEBUG

server:
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

app:
  scheduled-publishing:
    interval: 60000  # ms; default 1 minute
