application:
  name: abrolhos-test

spring:
  data:
    web:
      pageable:
        page-serialization-mode: via-dto
  flyway:
    baseline-on-migrate: true
  cache:
    type: none

cors:
  allowed-origins: http://localhost:3000

jwt:
  secret: test-jwt-secret-for-integration-tests
  expiration-hours: 24

rate-limit:
  auth:
    max-attempts: 5
    window-seconds: 300

security:
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    max-requests: 5
    window-minutes: 1
  encryption:
    key: RG4zLwEeuUgF733x/lyGl3ebjl0xeY+ToNLwrMMTxhs=
    old-keys: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: WARN
    br.dev.demoraes.abrolhos: INFO
    org.testcontainers: INFO

server:
  forward-headers-strategy: framework
